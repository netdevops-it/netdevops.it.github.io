name: Auto-post to Bluesky

on:
  # DISABLED - Workflow disabled due to duplicate posting issues
  # schedule:
  #   # Run every 6 hours to check for new posts
  #   - cron: '0 */6 * * *'
  # push:
  #   branches: [ main ]
  #   paths:
  #     - 'docs/blog/posts/**/*.md'
  #     - '.github/workflows/bluesky-auto-post.yml'
  #     - '.github/scripts/bluesky_auto_post.py'
  workflow_dispatch: # Only manual triggering allowed - workflow disabled for auto-posting

jobs:
  check-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Get full history to detect changes

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install atproto requests python-dateutil pyyaml

      - name: Manage draft status for scheduled posts
        run: |
          python .github/scripts/manage_draft_status.py

      - name: Check for newly published posts and post to Bluesky
        env:
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
        run: |
          python .github/scripts/bluesky_auto_post.py
# Trigger Bluesky workflow
